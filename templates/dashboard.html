<!DOCTYPE html>
<html>
<head>
    <title>Attendance Dashboard</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin: 0; padding: 20px; }
        h1 { color: #333; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .controls input[type="date"] { padding: 8px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn { padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-blue { background: #4a90e2; color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-gray { background: #95a5a6; color: white; }
        .cards { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .card { background: white; padding: 20px 40px; border-radius: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-width: 150px; }
        .card h2 { font-size: 40px; margin: 0; }
        .card p { margin: 5px 0 0; color: #666; }
        .total h2 { color: #4a90e2; }
        .present h2 { color: #27ae60; }
        .absent h2 { color: #e74c3c; }
        .table-wrap { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #4a90e2; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .badge-present { background: #27ae60; color: white; padding: 3px 10px; border-radius: 12px; font-size: 12px; }
        .badge-absent { background: #e74c3c; color: white; padding: 3px 10px; border-radius: 12px; font-size: 12px; }
        .no-records { text-align: center; padding: 40px; color: #999; font-size: 16px; }
        .date-label { text-align: center; color: #4a90e2; font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        .last-updated { text-align: center; color: #999; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🏢 Attendance Dashboard</h1>
    <p class="subtitle">Face Recognition Attendance System</p>

    <div class="controls">
        <input type="date" id="date-picker">
        <button class="btn btn-blue" onclick="filterByDate()">🔍 Filter</button>
        <button class="btn btn-green" onclick="showToday()">📅 Today</button>
        <button class="btn btn-gray" onclick="showAll()">📋 All Records</button>
        <button class="btn btn-blue" onclick="manualRefresh()">🔄 Refresh</button>
    </div>

    <div class="date-label" id="date-label">Today's Attendance</div>

    <div class="cards">
        <div class="card total">
            <h2 id="total">-</h2>
            <p>Total Employees</p>
        </div>
        <div class="card present">
            <h2 id="present">-</h2>
            <p>Present</p>
        </div>
        <div class="card absent">
            <h2 id="absent">-</h2>
            <p>Absent</p>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Date</th>
                    <th>Punch In</th>
                    <th>Punch Out</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="attendance-table"></tbody>
        </table>
    </div>

    <p class="last-updated" id="last-updated"></p>

    <script>
        // Get today in YYYY-MM-DD format
        const today = new Date();
        const todayStr = today.getFullYear() + '-' +
            String(today.getMonth() + 1).padStart(2, '0') + '-' +
            String(today.getDate()).padStart(2, '0');

        document.getElementById('date-picker').value = todayStr;

        let currentFilter = todayStr;
        let autoRefreshInterval = null;

        function loadData(filter) {
            if (filter !== undefined) {
                currentFilter = filter;
            }

            console.log('Loading data for:', currentFilter);

            // Load summary
            fetch('/api/summary?date=' + currentFilter)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('total').textContent = data.total;
                    document.getElementById('present').textContent = data.present;
                    document.getElementById('absent').textContent = data.absent;
                })
                .catch(err => console.error('Summary error:', err));

            // Load table
            fetch('/api/attendance?date=' + currentFilter)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('attendance-table');
                    tbody.innerHTML = '';

                    if (data.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="7" class="no-records">
                                    📭 No records found for this date
                                </td>
                            </tr>`;
                        return;
                    }

                    data.forEach((row, index) => {
                        const badge = row.status === 'Present'
                            ? '<span class="badge-present">✅ Present</span>'
                            : '<span class="badge-absent">❌ Absent</span>';

                        tbody.innerHTML += '<tr>' +
                            '<td>' + (index + 1) + '</td>' +
                            '<td><b>' + row.name + '</b></td>' +
                            '<td>' + row.department + '</td>' +
                            '<td>' + row.date + '</td>' +
                            '<td>' + row.punch_in + '</td>' +
                            '<td>' + row.punch_out + '</td>' +
                            '<td>' + badge + '</td>' +
                            '</tr>';
                    });

                    const now = new Date().toLocaleTimeString();
                    document.getElementById('last-updated').textContent =
                        'Last updated: ' + now;
                })
                .catch(err => console.error('Attendance error:', err));
        }

        function filterByDate() {
            const picker = document.getElementById('date-picker');
            const rawValue = picker.value;

            if (!rawValue) {
                alert('Please select a date!');
                return;
            }

            // Build date string manually to avoid timezone issues
            const parts = rawValue.split('-');
            const formatted = parts[0] + '-' +
                parts[1].padStart(2, '0') + '-' +
                parts[2].padStart(2, '0');

            console.log('Filter date:', formatted);

            document.getElementById('date-label').textContent =
                'Attendance for ' + formatted;

            clearInterval(autoRefreshInterval);
            loadData(formatted);
        }

        function showToday() {
            document.getElementById('date-picker').value = todayStr;
            document.getElementById('date-label').textContent =
                "Today's Attendance";

            clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(function() {
                loadData();
            }, 10000);

            loadData(todayStr);
        }

        function showAll() {
            document.getElementById('date-label').textContent =
                'All Attendance Records';
            clearInterval(autoRefreshInterval);
            loadData('all');
        }

        function manualRefresh() {
            loadData();
            const now = new Date().toLocaleTimeString();
            document.getElementById('last-updated').textContent =
                'Manually refreshed at: ' + now;
        }

        // Load today on start
        loadData(todayStr);

        // Auto refresh every 10 seconds for today
        autoRefreshInterval = setInterval(function() {
            if (currentFilter === todayStr) {
                loadData();
            }
        }, 10000);
    </script>
</body>
</html>
